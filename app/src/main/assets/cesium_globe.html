<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cesium Globe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">

    <script src="https://unpkg.com/cesium@1.111/Build/Cesium/Cesium.js"></script>
    <link href="https://unpkg.com/cesium@1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        html, body, #cesiumContainer {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden;
            background: #000;
        }

        #tile-loader {
            position: absolute; top: 24px; left: 24px; width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid #4CAF50;
            border-radius: 50%; animation: spin 1s linear infinite; z-index: 1000; display: none;
        }

        #loader {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            margin: -30px 0 0 -30px; border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #FF0000; border-radius: 50%;
            animation: spin 1s linear infinite; z-index: 999;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .cesium-widget-credits { display: none !important; }

        #custom-popup {
            position: absolute; background: rgba(25, 28, 30, 0.95); color: white;
            border-radius: 16px; padding: 16px; width: 220px; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none; z-index: 1000; transform: translate(-50%, -100%); margin-top: -35px;
            pointer-events: auto; font-family: sans-serif; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
        }
        #custom-popup .close-btn {
            position: absolute; top: 12px; right: 12px; cursor: pointer;
            font-size: 14px; color: #aaa; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
        }
        #custom-popup .title { font-size: 16px; font-weight: bold; margin-bottom: 4px; padding-right: 24px; line-height: 1.2;}
        #custom-popup .subtitle { font-size: 12px; color: #ccc; margin-bottom: 12px;}
        #custom-popup .images { display: flex; gap: 6px; margin-bottom: 8px; }
        #custom-popup .images img { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
        #custom-popup .nav-btn {
            background: #BB86FC; color: black; border-radius: 8px; padding: 8px 0; text-align: center;
            font-weight: bold; font-size: 14px; cursor: pointer; margin-top: 8px; display: flex;
            align-items: center; justify-content: center; gap: 4px;
        }
    </style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="loader"></div>
<div id="tile-loader"></div>

<div id="custom-popup">
    <div class="close-btn" onclick="hidePopup()">✕</div>
    <div class="title" id="popup-title">Titel</div>
    <div class="subtitle" id="popup-subtitle">Datum</div>
    <div class="images" id="popup-images"></div>
    <div class="nav-btn" onclick="navigateToDetail()">Details ansehen ➔</div>
</div>

<script>
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0Nzc1Nzc0Yi1mYzg4LTQwZWQtODc1NS0xNzBkZjU1ZGRlZDAiLCJpZCI6NDA4ODc5LCJpYXQiOjE3NzQ0MzExMDh9.l97sgxaAGqcNZS7CQ2wvZm1Lv1FBcDgIO5uyaksXKqk";

    const viewer = new Cesium.Viewer('cesiumContainer', {

        terrainProvider: new Cesium.EllipsoidTerrainProvider(),

        baseLayerPicker: false,
        animation: false,
        timeline: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        selectionIndicator: false,
        infoBox: false,

        requestRenderMode: true,
        maximumRenderTimeChange: Infinity,

        // 🌟 FIX 1: Muss auf true stehen, sonst schneiden Mali-GPUs (Android) den Globus eckig ab!
        logarithmicDepthBuffer: true

        // 🌟 FIX 2: Die kompletten contextOptions wurden entfernt.
        // Durch 'stencil: false' hat sich Cesium auf manchen Handys selbst zerschossen.
    });

    viewer.scene.globe.baseColor = Cesium.Color.BLACK;

    viewer.scene.globe.maximumScreenSpaceError = 0.8;
    viewer.scene.globe.loadingDescendantLimit = 20;
    viewer.scene.globe.preloadAncestors = true;
    viewer.scene.globe.preloadSiblings = true;
    viewer.scene.globe.tileCacheSize = 2000;

    // 🌟 FIX 2: Verhindert den WebView-Absturz bei extrem hoher System-Schriftgröße!
   viewer.useBrowserRecommendedResolution = false;

    const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
    viewer.resolutionScale = 1 / pixelRatio;
    viewer.scene.globe.tileLoadProgressEvent.addEventListener(queuedTileCount => {
        const spinner = document.getElementById("tile-loader");
        if (spinner) spinner.style.display = queuedTileCount > 0 ? "block" : "none";
    });

    viewer.scene.fog.enabled = false; viewer.scene.globe.showGroundAtmosphere = false;
    viewer.scene.skyAtmosphere.show = false; viewer.scene.highDynamicRange = false;

    // Earth Glow Effect
    viewer.scene.primitives.add(new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({ geometry: new Cesium.EllipsoidGeometry({ radii: new Cesium.Cartesian3(6800000.0, 6800000.0, 6800000.0) }) }),
        appearance: new Cesium.EllipsoidSurfaceAppearance({
            material: new Cesium.Material({
                fabric: { type: 'EarthGlow', uniforms: { color: new Cesium.Color(0.0, 0.5, 1.0, 1.0) },
                    source: `czm_material czm_getMaterial(czm_materialInput materialInput) {
                        czm_material material = czm_getDefaultMaterial(materialInput);
                        float v = abs(dot(normalize(materialInput.positionToEyeEC), normalize(materialInput.normalEC)));
                        float intensity = pow(1.0 - v, 1.5);
                        material.emission = color.rgb * intensity * 2.0; material.alpha = intensity * 0.7; return material;
                    }`
                }
            }), aboveGround: true, translucent: true
        })
    }));

    viewer.imageryLayers.removeAll();

    let satelliteLayer = viewer.imageryLayers.addImageryProvider(
        new Cesium.UrlTemplateImageryProvider({
            url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            maximumLevel: 19,
            credit: "Esri",
            enablePickFeatures: false
        })
    );

    // Straßennamen / Städte
    let labelLayer = viewer.imageryLayers.addImageryProvider(
        new Cesium.UrlTemplateImageryProvider({
            url: "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
            maximumLevel: 19,
            credit: "Esri",
            enablePickFeatures: false
        })
    );

    // Labels starten unsichtbar
    labelLayer.alpha = 0.0;


    // Smooth Fade beim Zoomen
    viewer.scene.preRender.addEventListener(function () {

        const height = viewer.camera.positionCartographic.height;

        const fadeStart = 1200000.0; // beginnt
        const fadeEnd   = 250000.0;  // voll sichtbar

        let alpha;

        if (height > fadeStart) {
            alpha = 0.0;
        }
        else if (height < fadeEnd) {
            alpha = 1.0;
        }
        else {
            alpha = 1.0 - ((height - fadeEnd) / (fadeStart - fadeEnd));
        }

        labelLayer.alpha = alpha;

    });



    viewer.camera.setView({ destination: Cesium.Cartesian3.fromDegrees(10, 50, 14000000), orientation: { heading: 0, pitch: -Math.PI / 2, roll: 0 } });

    const controller = viewer.scene.screenSpaceCameraController;
    controller.enableRotate = true; controller.enableTranslate = true; controller.enableTilt = false; controller.enableLook = false;
    controller._zoomFactor = 15.0; controller.zoomFactor = 10.0; controller.inertiaZoom = 0.05; controller.maximumZoomDistance = 30000000;
    controller.minimumZoomDistance = 50;

    controller.inertiaSpin = 0.9;
    controller.inertiaTranslate = 0.9;

    const markerDataSource = new Cesium.CustomDataSource('markers');
    viewer.dataSources.add(markerDataSource);

    markerDataSource.clustering.enabled = false;
    markerDataSource.clustering.pixelRange = 5; // Clustert nur, wenn sie WIRKLICH übereinander liegen
    markerDataSource.clustering.minimumClusterSize = 3;
    markerDataSource.clustering.clusterEvent.addEventListener(async function(clusteredEntities, cluster) {
        const count = clusteredEntities.length; const firstEntity = clusteredEntities[0];
        cluster.label.show = false;

        // Asynchrones Laden des Cluster-Bildes
        createRoundImage(firstEntity._originalImage, firstEntity._typeColor, count, firstEntity._borderColor).then(clusterImageUrl => {
            if (clusterImageUrl) {
                cluster.billboard.show = true;
                cluster.billboard.image = clusterImageUrl;
                cluster.billboard.width = 55; cluster.billboard.height = 55;
                cluster.billboard.verticalOrigin = Cesium.VerticalOrigin.CENTER;
                cluster.billboard.heightReference = Cesium.HeightReference.CLAMP_TO_GROUND;
                // 🌟 FIX: Cluster bleiben beim Rauszoomen immer sichtbar!
                cluster.billboard.disableDepthTestDistance = Number.POSITIVE_INFINITY;
                viewer.scene.requestRender();
            }
        });
    });

    let pickerMode = false;
    let locationMarker = null;

    let polylineEntities = [];
    let detailEntities = [];
    let activePopupEntity = null;
    const popupEl = document.getElementById('custom-popup');

    const svgPaths = {
        'car': 'M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z',
        'plane': 'M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z',
        'train': 'M12 2c-4 0-8 .5-8 4v9.5C4 17.43 5.57 19 7.5 19L6 20.5v.5h12v-.5L16.5 19c1.93 0 3.5-1.57 3.5-3.5V6c0-3.5-3.58-4-8-4zm0 2c3.4 0 6 .48 6 2.06v3.44H6V6.06C6 4.48 8.6 4 12 4zm-3 12c-.83 0-1.5-.67-1.5-1.5S8.17 13 9 13s1.5.67 1.5 1.5S9.83 16 9 16zm6 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z',
        'bike': 'M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm5.8-10l2.4-2.4.8.8c1.3 1.3 3 2.1 5.1 2.1V9c-1.5 0-2.7-.6-3.6-1.5l-1.9-1.9c-.5-.4-1-.7-1.6-.7s-1.1.2-1.4.6L8.5 8.4c-.3.4-.5.8-.5 1.3V12h2V9.8l1.8-1.7zm7.2 1.5c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5z',
        'walk': 'M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7',
        'book': 'M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z'
    };

    function getCustomTransportIcon(type) {
        const path = svgPaths[type] || svgPaths['car'];
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48"><circle cx="24" cy="24" r="20" fill="#222222" stroke="#ffffff" stroke-width="2.5"/><path d="${path}" fill="#ffffff" transform="translate(12,12)"/></svg>`;
        return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    function getDiaryIcon(color) {
        const path = svgPaths['book'];
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48"><circle cx="24" cy="24" r="22" fill="${color}" stroke="#ffffff" stroke-width="2"/><path d="${path}" fill="#ffffff" transform="translate(12,12) scale(1)"/></svg>`;
        return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    function hidePopup() {
        popupEl.style.display = 'none';
        activePopupEntity = null;
        viewer.scene.requestRender();
    }

    function navigateToDetail() {
        if (activePopupEntity && activePopupEntity._customId && window.Android) {
            window.Android.onMarkerClicked(activePopupEntity._customId);
        }
    }

    viewer.scene.preRender.addEventListener(function() {
        if (activePopupEntity && activePopupEntity.position && popupEl.style.display === 'block') {
            const pos = activePopupEntity.position.getValue(viewer.clock.currentTime);
            if (pos) {
                const canvasPos = Cesium.SceneTransforms.wgs84ToWindowCoordinates(viewer.scene, pos);
                if (canvasPos) {
                    popupEl.style.left = canvasPos.x + 'px';
                    popupEl.style.top = canvasPos.y + 'px';
                }
            }
        }
    });

    viewer.camera.moveEnd.addEventListener(function(){

        const center = viewer.camera.positionCartographic;

        const rectangle = Cesium.Rectangle.fromDegrees(
            Cesium.Math.toDegrees(center.longitude) - 5,
            Cesium.Math.toDegrees(center.latitude) - 5,
            Cesium.Math.toDegrees(center.longitude) + 5,
            Cesium.Math.toDegrees(center.latitude) + 5
        );

        viewer.scene.globe.preloadAncestors = true;
        viewer.scene.globe.preloadSiblings = true;

    });

    function clearDetails() {
        detailEntities.forEach(e => viewer.entities.remove(e));
        detailEntities = [];
        hidePopup();
        viewer.scene.requestRender();
    }

    window.setPickerMode = function(enabled) { pickerMode = enabled; };

    // 🌟 FIX: Ein Speicher-Cache, der verhindert, dass gleiche Bilder x-mal gerendert werden!
    const roundImageCache = new Map();

    async function createRoundImage(imageUrl, color, count = 0, borderColor = "#ffffff") {
        if (!imageUrl || imageUrl === "null") return null;
        const cacheKey = `${imageUrl}_${color}_${count}_${borderColor}`;
        if (roundImageCache.has(cacheKey)) return roundImageCache.get(cacheKey);

        return new Promise(resolve => {
            const baseSize = 64; // Klein und extrem schnell
            const canvas = document.createElement("canvas");
            canvas.width = baseSize; canvas.height = baseSize;
            const ctx = canvas.getContext("2d");
            const img = new Image();
            if (!imageUrl.startsWith("data:")) img.crossOrigin = "anonymous";

            img.onload = () => {
                const c = baseSize / 2; const r = 26;
                ctx.save(); ctx.beginPath(); ctx.arc(c, c, r + 1, 0, Math.PI * 2);
                ctx.shadowColor = color; ctx.shadowBlur = 6; ctx.fillStyle = color; ctx.fill(); ctx.restore();
                ctx.save(); ctx.beginPath(); ctx.arc(c, c, r, 0, Math.PI * 2); ctx.clip();
                ctx.drawImage(img, c - r, c - r, r * 2, r * 2); ctx.restore();
                ctx.beginPath(); ctx.arc(c, c, r, 0, Math.PI * 2);
                ctx.strokeStyle = borderColor; ctx.lineWidth = 3; ctx.stroke();

                const resultUrl = canvas.toDataURL("image/webp", 0.6);
                roundImageCache.set(cacheKey, resultUrl);
                resolve(resultUrl);
            };
            img.onerror = () => { resolve(null); };
            img.src = imageUrl;
        });
    }

    window.setLocation = function(lat, lon) {

        if(lat === undefined || lon === undefined) return;

        const pos = Cesium.Cartesian3.fromDegrees(lon, lat);

        if(locationMarker){
            viewer.entities.remove(locationMarker);
        }

        locationMarker = viewer.entities.add({
            position: pos,
            point:{
                pixelSize:16,
                color:Cesium.Color.YELLOW,
                outlineColor:Cesium.Color.BLACK,
                outlineWidth:3,
                heightReference:Cesium.HeightReference.CLAMP_TO_GROUND,
                disableDepthTestDistance:Number.POSITIVE_INFINITY
            }
        });

        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, 15000),
            duration:1.2
        });
    };

    function addMarkerToSource(source, item, id, typeColor, borderColor = "#ffffff") {
        // 🌟 FIX 2: Absturz-Schutz für Tagebücher ohne Standort!
        if (item.lat === undefined || item.lat === null || item.lon === undefined || item.lon === null) return;

        const entity = source.entities.add({
            position: Cesium.Cartesian3.fromDegrees(item.lon, item.lat),
            // 🌟 FIX 3: Punkt sofort zeichnen und IMMER über der Erde halten
            point: {
                pixelSize: 14,
                color: Cesium.Color.fromCssColorString(typeColor || "#FF0000"),
                outlineColor: Cesium.Color.fromCssColorString(borderColor),
                outlineWidth: 2,
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                disableDepthTestDistance: Number.POSITIVE_INFINITY
            }
        });
        entity._customId = id;
        entity._originalImage = item.image;
        entity._typeColor = typeColor;
        entity._borderColor = borderColor;
        entity._itemData = item;

        // 🌟 FIX 4: Bilder asynchron laden und IMMER über der Erde halten
        if (item.image && item.image !== "" && item.image !== "null") {
            createRoundImage(item.image, typeColor, 0, borderColor).then(finalImageUrl => {
                if (finalImageUrl) {
                    entity.billboard = {
                        image: finalImageUrl,
                        width: 49,
                        height: 49,
                        verticalOrigin: Cesium.VerticalOrigin.CENTER,
                        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        scaleByDistance: new Cesium.NearFarScalar(1000, 1.0, 20000000, 0.4)
                    };
                    entity.point = undefined; // Punkt verstecken, sobald das Bild da ist
                    entity._safeImageUrl = finalImageUrl;
                    viewer.scene.requestRender();
                }
            });
        } else if (item.type === "diary") {
            // Diary-Eintrag ohne Bild -> Buch-Icon anzeigen
            entity.billboard = {
                image: getDiaryIcon(typeColor),
                width: 32,
                height: 32,
                verticalOrigin: Cesium.VerticalOrigin.CENTER,
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                disableDepthTestDistance: Number.POSITIVE_INFINITY,
                scaleByDistance: new Cesium.NearFarScalar(1000, 1.0, 20000000, 0.4)
            };
            entity.point = undefined;
        }
        viewer.scene.requestRender();
    }

    window.clearMapMarkers = function() { markerDataSource.entities.removeAll(); hidePopup(); viewer.scene.requestRender(); };

    window.appendPhotosToMap = function(data) {
        try {
            const items = typeof data === 'string' ? JSON.parse(data) : data;
            for (const item of items) addMarkerToSource(markerDataSource, item, "photo_" + item.id, "#4CAF50", "#ffffff");
            viewer.scene.requestRender();
        } catch(e){}
    };

    window.setGlobalData = function(data) {
        try {
            const items = typeof data === 'string' ? JSON.parse(data) : data;
            markerDataSource.entities.removeAll(); polylineEntities.forEach(e => viewer.entities.remove(e)); polylineEntities = []; hidePopup();

            let i = 0;
            function processChunk() {
                const chunkEnd = Math.min(i + 25, items.length);
                for (; i < chunkEnd; i++) {
                    const item = items[i];
                    if(item.type === "experience") {
                        addMarkerToSource(markerDataSource, item, "exp_"+item.id, "#4CAF50", "#ffffff");
                    }
                    else if(item.type === "diary") {
                        // 🌟 FIX 5: Tagebücher in Lila (#BB86FC)
                        addMarkerToSource(markerDataSource, item, "exp_"+item.id, "#BB86FC", "#ffffff");
                    }
                    else if(item.type === "trip") {
                        let coordinates = [];
                        if (item.stops) {
                            for (const s of item.stops) {
                                if(s.lat && s.lon) {
                                    coordinates.push(Cesium.Cartesian3.fromDegrees(s.lon, s.lat));
                                    s.tripName = item.title;
                                    addMarkerToSource(markerDataSource, s, "stop_"+item.id+"_"+s.id, "#FF0000", "#ffffff");
                                }
                            }
                        }
                        if (coordinates.length > 1) {
                            polylineEntities.push(viewer.entities.add({ polyline: { positions: coordinates, width: 4.0, material: Cesium.Color.RED, clampToGround: true } }));
                        }
                    }
                }
                viewer.scene.requestRender();
                if (i < items.length) {
                    requestAnimationFrame(processChunk);
                }
            }
            processChunk();
        } catch(e){}
    };

    window.setTripPath = function(data) {
        clearDetails(); polylineEntities.forEach(e => viewer.entities.remove(e)); polylineEntities = []; hidePopup();
        try {
            const items = typeof data === 'string' ? JSON.parse(data) : data;
            let coordinates = []; let prevPos = null;
            for (let i = 0; i < items.length; i++) {
                const item = items[i]; const pos = Cesium.Cartesian3.fromDegrees(item.lon, item.lat); coordinates.push(pos);
                if (prevPos && item.transportMode && svgPaths[item.transportMode]) {
                    const midPos = Cesium.Cartesian3.lerp(prevPos, pos, 0.5, new Cesium.Cartesian3());
                    const maxVisibility = Math.max(Cesium.Cartesian3.distance(prevPos, pos) * 4.0, 50000.0);
                    detailEntities.push(viewer.entities.add({ position: midPos, billboard: { image: getCustomTransportIcon(item.transportMode), width: 28, height: 28, heightReference: Cesium.HeightReference.CLAMP_TO_GROUND, disableDepthTestDistance: Number.POSITIVE_INFINITY, distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, maxVisibility) } }));
                }
                if (!item.isMini) {
                    const color = "#FF0000";
                    const entity = viewer.entities.add({
                        position: pos,
                        point: { pixelSize: 15, color: Cesium.Color.RED, outlineColor: Cesium.Color.WHITE, outlineWidth: 3, heightReference: Cesium.HeightReference.CLAMP_TO_GROUND, disableDepthTestDistance: Number.POSITIVE_INFINITY } // 🌟 FIX
                    });
                    if(item.id) entity._customId = "stop_" + item.id;
                    entity._itemData = item;
                    detailEntities.push(entity);
                    if (item.image && item.image !== "" && item.image !== "null") {
                        createRoundImage(item.image, color).then(img => {
                            if (img) {
                                entity.billboard = { image: img, width: 56, height: 56, verticalOrigin: Cesium.VerticalOrigin.CENTER, heightReference: Cesium.HeightReference.CLAMP_TO_GROUND, disableDepthTestDistance: Number.POSITIVE_INFINITY };
                                entity.point = undefined;
                                viewer.scene.requestRender();
                            }
                        });
                    }
                } else {
                    detailEntities.push(viewer.entities.add({ position: pos, point: { pixelSize: 8, color: Cesium.Color.WHITE.withAlpha(0.8), heightReference: Cesium.HeightReference.CLAMP_TO_GROUND, disableDepthTestDistance: 0 } }));
                }
                prevPos = pos;
            }
            if (coordinates.length > 1) {
                const polyline = viewer.entities.add({ polyline: { positions: coordinates, width: 5.0, material: Cesium.Color.RED, clampToGround: true } });
                polylineEntities.push(polyline); viewer.zoomTo(polyline, new Cesium.HeadingPitchRange(0, -Math.PI/2, 0));
            }
            viewer.scene.requestRender();
        } catch(e) {}
    };

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(click){
        const picked = viewer.scene.pick(click.position);

        if(picked && picked.id && picked.id._customId && window.Android) {
            if(picked.id._customId.startsWith("photo_")) {
                window.Android.onMarkerClicked(picked.id._customId);
                return;
            }

            activePopupEntity = picked.id;
            const data = activePopupEntity._itemData || {};

            document.getElementById('popup-title').innerText = data.title || "Ort markiert";

            let subtitleText = data.date || "";
            if (data.tripName) {
                subtitleText = data.tripName + (subtitleText ? " • " + subtitleText : "");
            }
            document.getElementById('popup-subtitle').innerText = subtitleText;

            const imgContainer = document.getElementById('popup-images');
            imgContainer.innerHTML = '';

            if (data.image && data.image !== "null") {
                imgContainer.innerHTML += `<img src="${data.image}">`;
            }
            if (data.extraImages && Array.isArray(data.extraImages)) {
                data.extraImages.slice(0, 2).forEach(img => {
                    imgContainer.innerHTML += `<img src="${img}">`;
                });
            }

            popupEl.style.display = 'block';
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(data.lon, data.lat, viewer.camera.positionCartographic.height),
                duration: 0.5
            });
            viewer.scene.requestRender();
            return;
        }

        hidePopup();

        if(pickerMode){

            const ray = viewer.camera.getPickRay(click.position);
            const cartesian = viewer.scene.globe.pick(ray, viewer.scene);

            if(cartesian){

                const cartographic = Cesium.Cartographic.fromCartesian(cartesian);

                const lat = Cesium.Math.toDegrees(cartographic.latitude);
                const lon = Cesium.Math.toDegrees(cartographic.longitude);

                window.setLocation(lat, lon);

                if(window.Android){
                    window.Android.onLocationPicked(lat, lon);
                }
            }

        }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    window.zoomToPoint = function(lat, lon){
        if (lat === undefined || lat === null || lon === undefined || lon === null) { window.resetGlobeView(); return; }
        viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(lon, lat, 15000), duration: 1.2 });
    };

    window.zoomToBounds = function(minLat, minLon, maxLat, maxLon, offset) {
        let latPadding = (maxLat - minLat) * 0.2; let lonPadding = (maxLon - minLon) * 0.2;
        if (latPadding === 0) latPadding = 0.5; if (lonPadding === 0) lonPadding = 0.5;
        viewer.camera.flyTo({ destination: Cesium.Rectangle.fromDegrees(minLon - lonPadding, minLat - latPadding, maxLon + lonPadding, maxLat + latPadding), duration: 1.2 });
    };

    window.resetGlobeView = function() { viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(10, 50, 14000000), duration: 1.5 }); };

    window.startIntroSpin = function() {
        if (!window.Android || !window.Android.checkAndMarkSpun) return;
        if (window.Android.checkAndMarkSpun()) return;
        let isAutoRotating = false; let isIntroSpinning = true; let introStartTime = 0; const introDuration = 2000; let previousEasedProgress = 0; const slowSpinSpeed = 0.0008;
        const onTickListener = function() {
            if (!isAutoRotating) return;
            if (isIntroSpinning) {
                let now = Date.now(); let progress = (now - introStartTime) / introDuration;
                if (progress >= 1.0) { viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, (1.0 - previousEasedProgress) * (Math.PI * 2)); isIntroSpinning = false; }
                else { let easedProgress = -(Math.cos(Math.PI * progress) - 1) / 2; viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, (easedProgress - previousEasedProgress) * (Math.PI * 2)); previousEasedProgress = easedProgress; }
            } else { viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, slowSpinSpeed); }
        };
        viewer.clock.onTick.addEventListener(onTickListener);
        const stopRotation = () => { isAutoRotating = false; viewer.clock.onTick.removeEventListener(onTickListener); viewer.camera.moveStart.removeEventListener(stopRotation); };
        setTimeout(() => { introStartTime = Date.now(); isAutoRotating = true; viewer.camera.moveStart.addEventListener(stopRotation); const canvas = viewer.scene.canvas; canvas.addEventListener('mousedown', stopRotation, { passive: true }); canvas.addEventListener('touchstart', stopRotation, { passive: true }); canvas.addEventListener('wheel', stopRotation, { passive: true }); }, 1000);
    };

    window.addEventListener("load",()=>{ document.getElementById("loader").style.display="none"; });
</script>
</body>
