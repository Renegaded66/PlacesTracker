<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.100/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.100/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        .cesium-viewer-bottom { display: none !important; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script>
        let isReadOnly = false;
        let viewer;
        try {
            viewer = new Cesium.Viewer('cesiumContainer', {
                imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                    url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
                }),
                baseLayerPicker: false,
                geocoder: false,
                homeButton: false,
                infoBox: false,
                sceneModePicker: false,
                selectionIndicator: false,
                navigationHelpButton: false,
                animation: false,
                timeline: false,
                fullscreenButton: false,
                requestRenderMode: true
            });

            viewer.scene.globe.showGroundAtmosphere = false;
            if (viewer.scene.skyAtmosphere) {
                viewer.scene.skyAtmosphere.show = false;
            }

            const pinBuilder = new Cesium.PinBuilder();

            window.setReadOnly = function(readOnly) {
                isReadOnly = readOnly;
            };

            window.setLocation = function(lat, lon) {
                viewer.entities.removeAll();
                viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(lon, lat),
                    billboard: {
                        image: pinBuilder.fromColor(Cesium.Color.RED, 48).toDataURL(),
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM
                    }
                });
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(lon, lat, 15000.0),
                    duration: 2
                });
                viewer.scene.requestRender();
            };

            window.setTripPath = function(pointsJson) {
                const points = JSON.parse(pointsJson);
                viewer.entities.removeAll();
                
                const positions = [];
                points.forEach((p, index) => {
                    const pos = Cesium.Cartesian3.fromDegrees(p.lon, p.lat);
                    positions.push(pos);
                    
                    viewer.entities.add({
                        position: pos,
                        billboard: {
                            image: p.image ? p.image : pinBuilder.fromText((index + 1).toString(), Cesium.Color.GOLD, 40).toDataURL(),
                            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                            width: 48,
                            height: 48,
                            eyeOffset: new Cesium.Cartesian3(0, 0, -10)
                        }
                    });
                });

                if (positions.length > 1) {
                    viewer.entities.add({
                        polyline: {
                            positions: positions,
                            width: 5,
                            material: new Cesium.PolylineGlowMaterialProperty({
                                glowPower: 0.2,
                                color: Cesium.Color.YELLOW
                            }),
                            clampToGround: true
                        }
                    });
                }

                if (positions.length > 0) {
                    viewer.flyTo(viewer.entities, {
                        duration: 3.0,
                        offset: new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-45), 0)
                    });
                }
                viewer.scene.requestRender();
            };

            window.setGlobalData = function(dataJson) {
                const data = JSON.parse(dataJson);
                viewer.entities.removeAll();

                data.forEach(item => {
                    if (item.type === 'experience' && item.lat && item.lon) {
                        const pos = Cesium.Cartesian3.fromDegrees(item.lon, item.lat);
                        viewer.entities.add({
                            position: pos,
                            billboard: {
                                image: item.image ? item.image : pinBuilder.fromColor(Cesium.Color.BLUE, 48).toDataURL(),
                                verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                                width: 48,
                                height: 48,
                                eyeOffset: new Cesium.Cartesian3(0, 0, -10)
                            },
                            id: 'exp_' + item.id
                        });
                    } else if (item.type === 'trip' && item.stops) {
                        const positions = [];
                        item.stops.forEach((stop, index) => {
                            if (stop.lat && stop.lon) {
                                const pos = Cesium.Cartesian3.fromDegrees(stop.lon, stop.lat);
                                positions.push(pos);
                                viewer.entities.add({
                                    position: pos,
                                    billboard: {
                                        image: stop.image ? stop.image : pinBuilder.fromText((index + 1).toString(), Cesium.Color.GOLD, 40).toDataURL(),
                                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                                        width: 40,
                                        height: 40,
                                        eyeOffset: new Cesium.Cartesian3(0, 0, -10)
                                    },
                                    id: 'stop_' + item.id + '_' + stop.id
                                });
                            }
                        });
                        if (positions.length > 1) {
                            viewer.entities.add({
                                polyline: {
                                    positions: positions,
                                    width: 4,
                                    material: new Cesium.PolylineGlowMaterialProperty({
                                        glowPower: 0.1,
                                        color: Cesium.Color.CYAN
                                    }),
                                    clampToGround: true
                                }
                            });
                        }
                    }
                });
                viewer.scene.requestRender();
            };

            viewer.screenSpaceEventHandler.setInputAction(function(movement) {
                const pickedObject = viewer.scene.pick(movement.position);
                if (Cesium.defined(pickedObject) && pickedObject.id && pickedObject.id.id) {
                    if (window.Android) {
                        window.Android.onMarkerClicked(pickedObject.id.id);
                    }
                    return;
                }

                if (!isReadOnly) {
                    const cartesian = viewer.camera.pickEllipsoid(movement.position, viewer.scene.globe.ellipsoid);
                    if (cartesian) {
                        const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                        const lon = Cesium.Math.toDegrees(cartographic.longitude);
                        const lat = Cesium.Math.toDegrees(cartographic.latitude);
                        if (window.Android) window.Android.onLocationPicked(lat, lon);
                    }
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        } catch (e) {
            console.error("Cesium Error: " + e);
        }
    </script>
</body>
</html>
