<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cesium Globe</title>

    <!-- Cesium CDN -->
    <script src="https://unpkg.com/cesium@1.111/Build/Cesium/Cesium.js"></script>
    <link href="https://unpkg.com/cesium@1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        html, body, #cesiumContainer {
            width: 100%; height: 100%;
            margin: 0; padding: 0;
            overflow: hidden;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            margin: -30px 0 0 -30px;
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 999;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="loader"></div>

<script>
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0Nzc1Nzc0Yi1mYzg4LTQwZWQtODc1NS0xNzBkZjU1ZGRlZDAiLCJpZCI6NDA4ODc5LCJpYXQiOjE3NzQ0MzExMDh9.l97sgxaAGqcNZS7CQ2wvZm1Lv1FBcDgIO5uyaksXKqk";

    // 🌍 Viewer
    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrain: Cesium.Terrain.fromWorldTerrain(),
        baseLayerPicker: false,
        animation: false,
        timeline: false,
        geocoder: false,
        homeButton: false,
        sceneModePicker: false,
        navigationHelpButton: false,
        selectionIndicator: false,
        infoBox: false
    });

    viewer.scene.fog.enabled = false;
    viewer.scene.globe.showGroundAtmosphere = false;
    viewer.scene.skyAtmosphere.show = false;

    // Der dicke, angehobene Smooth Glow
    viewer.scene.primitives.add(new Cesium.Primitive({
        geometryInstances: new Cesium.GeometryInstance({
            geometry: new Cesium.EllipsoidGeometry({
                radii: new Cesium.Cartesian3(6800000.0, 6800000.0, 6800000.0)
            })
        }),
        appearance: new Cesium.EllipsoidSurfaceAppearance({
            material: new Cesium.Material({
                fabric: {
                    type: 'EarthGlow',
                    uniforms: { color: new Cesium.Color(0.0, 0.5, 1.0, 1.0) },
                    source: `
                        czm_material czm_getMaterial(czm_materialInput materialInput) {
                            czm_material material = czm_getDefaultMaterial(materialInput);
                            float v = abs(dot(normalize(materialInput.positionToEyeEC), normalize(materialInput.normalEC)));
                            float intensity = pow(1.0 - v, 1.5);
                            material.emission = color.rgb * intensity * 2.0;
                            material.alpha = intensity * 0.7;
                            return material;
                        }
                    `
                }
            }),
            aboveGround: true, translucent: true
        })
    }));

    // 📸 Satelliten-Textur
    viewer.imageryLayers.removeAll();
    viewer.imageryLayers.addImageryProvider(
        new Cesium.UrlTemplateImageryProvider({
            url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        })
    );

    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(10, 50, 20000000),
        orientation: { heading: 0, pitch: -Math.PI / 2, roll: 0 }
    });

    // 📸 1. Die Satelliten-Textur (Boden)
    viewer.imageryLayers.removeAll();
    viewer.imageryLayers.addImageryProvider(
        new Cesium.UrlTemplateImageryProvider({
            url: "https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        })
    );

    // 🗺️ 2. NEU: Die Ländergrenzen und Städtenamen (Transparentes Overlay)
    //viewer.imageryLayers.addImageryProvider(
    //    new Cesium.UrlTemplateImageryProvider({
    //        url: "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}"
    //    })
    //);
    const referenceLayer = viewer.imageryLayers.addImageryProvider(
        new Cesium.UrlTemplateImageryProvider({
            url: "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
            // Zwingt Cesium dazu, keine zu tiefen (matschigen) Zoom-Level zu laden
            maximumLevel: 10
        })
    );

    // 🌟 NEU: Der "Double Fade" (Weiches Ein- und Ausblenden je nach Kamerahöhe)
    viewer.scene.preUpdate.addEventListener(function() {
        const height = viewer.camera.positionCartographic.height;
        let newAlpha = 0.0;

        if (height > 8000000.0) {
            // Weltall (über 8000km): Unsichtbar
            newAlpha = 0.0;
        } else if (height > 4000000.0) {
            // Sanftes EINBLENDEN beim Anflug auf die Erde (zwischen 8000km und 4000km)
            newAlpha = 0.8 * (1.0 - ((height - 4000000.0) / 4000000.0));
        } else if (height > 500000.0) {
            // Perfekte Höhe: Deutlich sichtbar (aber bei 80% Deckkraft für einen Premium-Look)
            newAlpha = 0.8;
        } else if (height > 100000.0) {
            // Sanftes AUSBLENDEN beim nahen Reinzoomen! (Zwischen 500km und 100km)
            // Das versteckt den Pixel-Matsch absolut elegant!
            newAlpha = 0.8 * ((height - 100000.0) / 400000.0);
        } else {
            // Zu nah: Komplett unsichtbar. Der Fokus liegt nun voll auf deinen Markern!
            newAlpha = 0.0;
        }

        referenceLayer.alpha = newAlpha;
    });

    // ⚡ Controls & Limits
    const controller = viewer.scene.screenSpaceCameraController;
    controller.enableRotate = true;
    controller.enableTranslate = true;
    controller.enableTilt = false;
    controller.enableLook = false;

    controller._zoomFactor = 25.0;
    controller.zoomFactor = 15.0;
    controller.inertiaZoom = 0.05;
    controller.maximumMovementRatio = 0.4;

    controller.maximumZoomDistance = 25000000;
    controller.minimumZoomDistance = 100;

    // =================================================================
    // 🌟 CLUSTERING (Extreme Überlappung erlaubt)
    // =================================================================
    const markerDataSource = new Cesium.CustomDataSource('markers');
    viewer.dataSources.add(markerDataSource);

    markerDataSource.clustering.enabled = true;

    // 🌟 NEU: Heruntergesetzt auf 5! Erlaubt massives Überlappen der Bilder,
    // bevor sie sich zu einer "+X" Bubble zusammenziehen.
    markerDataSource.clustering.pixelRange = -20;
    markerDataSource.clustering.minimumClusterSize = 2;

    markerDataSource.clustering.clusterEvent.addEventListener(function(clusteredEntities, cluster) {

        // 🌟 NEU: Schöne, freigestellte Schrift OHNE grauen Kasten
        cluster.label.show = true;
        cluster.label.text = '+' + (clusteredEntities.length - 1);
        cluster.label.font = 'bold 20px sans-serif'; // Etwas größer gemacht
        cluster.label.fillColor = Cesium.Color.WHITE;

        // Der Kino-Untertitel-Trick: Weiße Schrift mit schwarzem Rand
        cluster.label.style = Cesium.LabelStyle.FILL_AND_OUTLINE;
        cluster.label.outlineColor = Cesium.Color.BLACK;
        cluster.label.outlineWidth = 5;

        cluster.label.pixelOffset = new Cesium.Cartesian2(0, 0);
        cluster.label.disableDepthTestDistance = Number.POSITIVE_INFINITY;

        // Das Bild darunter
        cluster.billboard.show = true;
        cluster.billboard.image = clusteredEntities[0]._safeImageUrl;
        cluster.billboard.width = 63;
        cluster.billboard.height = 63;
        cluster.billboard.verticalOrigin = Cesium.VerticalOrigin.CENTER;
        cluster.billboard.heightReference = Cesium.HeightReference.CLAMP_TO_GROUND;
        cluster.billboard.disableDepthTestDistance = Number.POSITIVE_INFINITY;

        cluster.billboard.id = { _customId: clusteredEntities[0]._customId };
    });

    let polylineEntities = [];

    function createRoundImage(imageUrl, color) {
        const baseSize = 180;
        const scale = 3;
        const size = baseSize * scale;

        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        ctx.scale(scale, scale);

        return new Promise(resolve => {
            const img = new Image();
            img.crossOrigin = "anonymous";

            img.onload = () => {
                const c = baseSize / 2;
                const r = baseSize / 2 - 12;

                ctx.beginPath();
                ctx.arc(c, c, r+6, 0, Math.PI*2);
                ctx.shadowColor = color;
                ctx.shadowBlur = 30;
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                ctx.beginPath();
                ctx.arc(c, c, r, 0, Math.PI*2);
                ctx.clip();
                ctx.drawImage(img, 0, 0, baseSize, baseSize);

                const grad = ctx.createRadialGradient(c,c,r-10,c,c,r+6);
                grad.addColorStop(0,"#fff");
                grad.addColorStop(0.5,color);
                grad.addColorStop(1,"#fff");

                ctx.beginPath();
                ctx.arc(c, c, r, 0, Math.PI*2);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 12;
                ctx.stroke();

                resolve(canvas.toDataURL());
            };
            img.onerror = () => resolve(null);
            img.src = imageUrl;
        });
    }

    async function addMarker(lat, lon, id, image) {
        const color = id.startsWith("exp_") ? "#4CAF50" : "#2196F3";
        const finalImageUrl = image ? await createRoundImage(image, color) : "https://cdn-icons-png.flaticon.com/512/684/684908.png";

        const entity = markerDataSource.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat),
            billboard: {
                image: finalImageUrl,
                width: 63,
                height: 63,

                // 🌟 NEU: Zentriert das einzelne Profilbild exakt auf die Koordinate!
                verticalOrigin: Cesium.VerticalOrigin.CENTER,

                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                disableDepthTestDistance: Number.POSITIVE_INFINITY
            }
        });

        entity._customId = id;
        entity._safeImageUrl = finalImageUrl;
    }

    // 🔄 Daten aus Android
    window.setGlobalData = function(json) {
        try {
            const data = JSON.parse(json);

            markerDataSource.entities.removeAll();

            polylineEntities.forEach(e => viewer.entities.remove(e));
            polylineEntities = [];

            data.forEach(item => {
                if(item.type==="experience") {
                    if(item.lat && item.lon) addMarker(item.lat,item.lon,"exp_"+item.id,item.image);
                }

                if(item.type==="trip") {
                    let coordinates = [];

                    item.stops.forEach(s => {
                        if(s.lat && s.lon) {
                            coordinates.push(Cesium.Cartesian3.fromDegrees(s.lon, s.lat));
                            addMarker(s.lat, s.lon, "stop_"+item.id+"_"+s.id, s.image);
                        }
                    });

                    if (coordinates.length > 1) {
                        const polylineEntity = viewer.entities.add({
                            polyline: {
                                positions: coordinates,
                                width: 4.0,
                                material: Cesium.Color.WHITE,
                                clampToGround: true
                            }
                        });
                        polylineEntities.push(polylineEntity);
                    }
                }
            });

        } catch(e){ console.error(e); }
    };

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(click){
        const picked = viewer.scene.pick(click.position);
        if(picked && picked.id && picked.id._customId && window.Android) window.Android.onMarkerClicked(picked.id._customId);
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    window.zoomToPoint = function(lat, lon, offset){
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, 1200000),
            duration: 1.2
        });
    };

    window.addEventListener("load",()=>{
        const loader = document.getElementById("loader");
        loader.style.display="none";
    });
</script>
</body>
</html>
